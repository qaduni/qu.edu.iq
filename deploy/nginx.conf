server {
    # Bind both stacks. Alpine's musl resolves `localhost` to ::1 first, so any
    # tooling (curl/wget/healthchecks/sidecars) that hits "localhost" inside the
    # container would otherwise get "Connection refused". The Dockerfile
    # healthcheck now uses 127.0.0.1 explicitly, but listening on IPv6 too is
    # cheap insurance against this class of bug.
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- Compression ----------
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_proxied       any;
    # text/html is compressed implicitly by nginx whenever gzip is on, so do
    # not list it here — that produces a "duplicate MIME type" warning at boot.
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/manifest+json
        image/svg+xml
        font/woff2;

    # Serve pre-compressed *.gz beside the original when the client supports it.
    gzip_static on;

    # ---------- Security headers ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---------- Long-cache: hashed assets and immutable media ----------
    # Hugo fingerprints CSS/JS; theme images/fonts rarely change.
    location ~* \.(?:css|js|mjs|woff|woff2|ttf|otf|eot|png|jpe?g|gif|webp|avif|ico|svg|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ---------- Short-cache: feeds and standalone HTML ----------
    location ~* \.(?:html|xml|json|txt)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # ---------- Pagefind bundles ----------
    # Pagefind ships its own .pf_meta / .pf_index files; let it serve them raw.
    location ~* /pagefind(?:-[a-z]+)?/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate" always;
        try_files $uri =404;
    }

    # ---------- Clean-URL routing ----------
    # Hugo generates /about/index.html etc. Try the file, the directory, then 404.
    # Apply a short cache to directory-served HTML, which won't hit the
    # extension-based regex location above.
    location / {
        expires 5m;
        add_header Cache-Control "public, must-revalidate" always;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ---------- Custom error page (Hugo emits 404.html at the root) ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ---------- Don't serve dotfiles ----------
    location ~ /\.(?!well-known) {
        deny all;
    }
}
