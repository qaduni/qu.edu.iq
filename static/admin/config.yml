# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: qaduni/qu.edu.iq
  branch: main

media_folder: "static/media"
public_folder: "/media"

i18n:
  structure: multiple_files
  locales: [ar, en]
  default_locale: ar
  omit_default_locale_from_file_path: true

media_libraries:
  all:
    max_file_size: 5120000
    slugify_filename: true
    transformations:
      raster_image:
        format: webp     # Converts images (PNG, JPG, etc.) to WebP
        quality: 85      # Optional: set WebP compression quality (default is 85)
      svg:
        optimize: true

site_url: https://qu.edu.iq
display_url: https://qu.edu.iq

collections:
  # ---------------------------------------------------------------------------
  # Entry collections — editors create new items here.
  # ---------------------------------------------------------------------------
  - name: "news"
    label: "الأخبار"
    label_singular: "/ خبر"
    description: "الاخبار تظهر في الصفحة الرئيسية ومركز الاخبار وتحتوي على غلاف."
    i18n: true
    folder: "content/media/news"
    path: "{{year}}/{{month}}/{{day}}/{{slug}}"
    create: true
    identifier_field: "title_en"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "English Title (Generates URL) / العنوان الانجليزي للرابط", name: "title_en", widget: "string", required: true, i18n: duplicate }
      - { label: "Title / العنوان", name: "title", widget: "string", required: true, i18n: true }
      - { label: "Description / الوصف", name: "description", widget: "text", required: true, i18n: true }
      - { label: "Image / الصورة", name: "image", widget: "image", required: false, i18n: duplicate }
      - { label: "Body / المحتوى", name: "body", widget: "markdown", i18n: true }

  - name: "announcements"
    label: "الإعلانات"
    label_singular: "إعلان"
    description: "الإعلانات تظهر في الصفحة الرئيسية ومركز الاخبار ولا تحتوي على غلاف."
    i18n: true
    folder: "content/media/announcements"
    path: "{{year}}/{{month}}/{{day}}/{{slug}}"
    create: true
    identifier_field: "title_en"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "English Title (Generates URL) / العنوان الانجليزي للرابط", name: "title_en", widget: "string", required: true, i18n: duplicate }
      - { label: "Title / العنوان", name: "title", widget: "string", required: true, i18n: true }
      - { label: "Type / النوع", name: "type", widget: "select", i18n: duplicate,
          options:
            [
              { label: "إداري / Administrative", value: "Administrative" },
              { label: "أكاديمي / Academic", value: "Academic" },
              { label: "طلبة / Students", value: "Students" },
              { label: "عام / General", value: "General" },
            ]
        }
      - { label: "Important / مهم", name: "important", widget: "boolean", default: false, i18n: duplicate }
      - { label: "Description / الوصف", name: "description", widget: "text", required: true, i18n: true }
      - { label: "Body / المحتوى", name: "body", widget: "markdown", i18n: true }

  # ---------------------------------------------------------------------------
  # Landing pages — `content/_index.md`, `content/colleges/_index.md`,
  # `content/students/_index.md` are the only section indexes with real body
  # content; the rest are `layout: redirect` stubs and are not exposed here.
  # ---------------------------------------------------------------------------
  - name: "landing_pages"
    label: "الصفحات الرئيسية"
    description: "الصفحة الرئيسية وصفحات الكليات والطلبة."
    i18n: true
    files:
      - name: "homepage"
        label: "الرئيسية / Home"
        file: "content/_index.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Description", name: "description", widget: "string", required: true, i18n: true }
          - { label: "Body", name: "body", widget: "markdown", required: false, i18n: true }
      - name: "colleges_index"
        label: "الكليات / Colleges"
        file: "content/colleges_and_centres/_index.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Description", name: "description", widget: "string", required: true, i18n: true }
          - { label: "Body", name: "body", widget: "markdown", required: false, i18n: true }
      - name: "students_index"
        label: "الطلبة / Students"
        file: "content/students/_index.md"
        i18n: true
        fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - { label: "Description", name: "description", widget: "string", required: true, i18n: true }
          - { label: "Body", name: "body", widget: "markdown", required: false, i18n: true }

  # ---------------------------------------------------------------------------
  # Section folder collections. Editors can update existing pages or create
  # new ones inside each section. `_index.md` / `_index.en.md` are excluded
  # because they are structural stubs (redirects) and shouldn't be edited
  # through the CMS.
  # ---------------------------------------------------------------------------
  - name: "about_pages"
    label: "حول الجامعة"
    folder: "content/about"
    create: true
    i18n: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"

    filter:
      exclude:
        - "_index.md"
        - "_index.en.md"

    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Description", name: "description", widget: "string", required: true, i18n: true }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }

  - name: "about_policies"
