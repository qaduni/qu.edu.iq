# Wrapped under `items:` so the CMS (Sveltia) can edit this file via a single
# `list` widget — CMS schemas can't target a YAML root-level list directly.
# Templates iterate `hugo.Data.colleges.items`.
items:
  - id: "medicine"
    name_en: "College of Medicine"
    name_ar: "كلية الطب"
    desc_en: "Preparing distinguished physicians capable of providing the best healthcare services"
    desc_ar: "إعداد أطباء متميزين قادرين على تقديم أفضل الخدمات الصحية"
    url: "https://med.qu.edu.iq"
    icon: "icon-research"

  - id: "engineering"
    name_en: "College of Engineering"
    name_ar: "كلية الهندسة"
