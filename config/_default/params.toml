# =============================================================================
# Site Params — qa.qu.edu.iq (Quality Assurance Department, Al-Qadisiyah Uni)
#
# These are the SITE-LEVEL overrides. The qu.theme ships neutral defaults
# for everything below; only override what is specific to this organisation.
#
# NOTE: Hugo loads `config/_default/params.toml` as `[params]` automatically
#       — keys at the top of this file end up at `Site.Params.<key>`. Do not
#       add an explicit `[params]` wrapper.
# =============================================================================

campusMapEmbed = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6502.660195112489!2d44.883365968265096!3d32.00224502089407!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1558afd2a592f539%3A0x61917012d800ef85!2z2KzYp9mF2LnYqSDYp9mE2YLYp9iv2LPZitip!5e0!3m2!1sar!2siq!4v1768745727385!5m2!1sar!2siq"

# Optional "Official Domain / Official Email" notice in the footer.
# Common pattern for Iraqi government / university sites.
officialDomain = "qa.qu.edu.iq"
showOfficialDomainNotice = true

# Endpoints (empty string = feature is hidden / mailto fallback used)
contactFormEndpoint    = ""
graduateFormEndpoint   = ""
visitorCounterEndpoint = ""

# Contact info shown in the footer / top bar / contact section.
# `address` is a single human-readable string. Per-language overrides
# in hugo.toml localise it to Arabic / English.
[contact]
  email   = "qu.assurance@qu.edu.iq"
  phone   = ""
  address = "Al-Qadisiyah University, Al-Diwaniyah, Al-Qadisiyah Province, Iraq"

[social]
  facebook  = "https://facebook.com/qu.edu.iq"
  twitter   = "https://twitter.com/qu_edu_iq"
  youtube   = "https://youtube.com/qu_edu_iq"
  instagram = "https://instagram.com/qu_edu_iq"
  linkedin  = "https://www.linkedin.com/school/qu-edu-iq/"
  telegram  = ""
  whatsapp  = ""
  tiktok    = ""

[externalServices]
  universityMain    = "https://qu.edu.iq"
  sustainability    = "https://sust.qu.edu.iq"

# Schema.org JSON-LD identity (used by the theme's baseof.html)
[schema]
  type          = "EducationalOrganization"
  alternateName = "Al-Qadisiyah University"

  # Structured postal address for JSON-LD only — kept separate from the
  # human-readable `contact.address` above.
  [schema.address]
    locality = "Al-Diwaniyah"
    region   = "Al-Qadisiyah Province"
    country  = "Iraq"

# Content section paths — drive where the homepage news/announcement
# widgets pull from and where the news list page reads its companion
# announcements section from. Change these if you reorganise content.
[contentSections]
  news          = "/media/news"
  announcements = "/media/announcements"
  contact       = "/media/contact"
  podcast       = "/media/podcast"

# Brand theme colours. Override any one to re-skin the theme.
[theme]
  primaryColor      = "#0f4c81"
  primaryColorLight = "#1a6bb5"
  primaryColorDark  = "#0a3459"
  accentColor       = "#ffd700"

# PWA & search feature flags
[pwa]
  enabled = true

[search]
  pagefind = true
