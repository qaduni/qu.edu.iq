baseURL = 'https://qu.edu.iq/'
locale = 'ar'
defaultContentLanguage = 'ar'
title = "جامعة القادسية"
buildFuture = true
theme = "qu.theme"

[pagination]
  pagerSize = 10

[languages]
  [languages.ar]
    label = "العربية"
    weight = 1
    direction = "rtl"
    title = "جامعة القادسية"
    locale = "ar"

    [languages.ar.params]
      description = "جامعة القادسية - إحدى الجامعات العراقية الحكومية الرائدة في التعليم العالي والبحث العلمي، تقع في محافظة القادسية وتضم 18 كلية متخصصة"
      shortTitle  = "جامعة القادسية"

      [languages.ar.params.contact]
        address = "جامعة القادسية، الديوانية، محافظة القادسية، العراق"

  [languages.en]
    label = "English"
    weight = 2
    direction = "ltr"
    title = "Al-Qadisiyah University"
    locale = "en"

    [languages.en.params]
      description = "Al-Qadisiyah University — a leading Iraqi public university for higher education and scientific research, located in Al-Diwaniyah and home to 18 specialised colleges"
      shortTitle  = "Al-Qadisiyah University"

      [languages.en.params.contact]
        address = "Al-Qadisiyah University, Al-Diwaniyah, Al-Qadisiyah Province, Iraq"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Editors authoring through the CMS are trusted, but keep this 'false'
      # so a compromised account can't inject raw <script>/<iframe>/on-event
      # handlers via markdown bodies.
      unsafe = false

[outputs]
  home = ["HTML", "RSS", "sitemap", "WebAppManifest"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
